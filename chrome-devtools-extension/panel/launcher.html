<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>DevTools++ Launcher</title>
  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      padding: 60px 40px;
      text-align: center;
      color: #444;
      background: #f8f8f8;
      margin: 0;
    }
    h1 {
      font-size: 18px;
      font-weight: 600;
      margin: 0 0 12px;
      color: #1A73E8;
    }
    .title-plus { color: #EA4335; }
    .title-plus2 { color: #FBBC04; }
    p { color: #666; font-size: 13px; margin: 8px 0; }
    .err { color: #d32f2f; }
    .small { font-size: 11px; color: #999; margin-top: 24px; }
  </style>
</head>
<body>
  <h1>DevTools<span class="title-plus">+</span><span class="title-plus2">+</span></h1>
  <p id="status">Preparing intercepted request...</p>
  <p class="small">This page navigates automatically. Switch to the original DevTools++ panel to act on the Intercept queue.</p>
  <script src="launcher.js"></script>
</body>
</html>
