<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      width: 280px;
      padding: 14px 16px;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      font-size: 12px;
      background: #1e1e1e;
      color: #d4d4d4;
    }
    .title {
      font-size: 13px;
      font-weight: 600;
      margin-bottom: 12px;
      color: #fff;
    }
    .title .v {
      color: #888;
      font-weight: 400;
      font-size: 11px;
      margin-left: 6px;
    }
    .row {
      display: flex;
      align-items: center;
      padding: 6px 0;
      border-top: 1px solid #2a2a2a;
      gap: 8px;
    }
    .row:first-of-type { border-top: none; }
    .row-icon {
      width: 14px;
      flex-shrink: 0;
      text-align: center;
    }
    .row-text {
      flex: 1;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }
    .row-text .label {
      color: #888;
      margin-right: 4px;
    }
    .row-text .value {
      color: #d4d4d4;
      font-family: 'SF Mono', Consolas, monospace;
      font-size: 11px;
    }
    .row-text .value.muted { color: #666; }
    .status-ok    { color: #4caf50; }
    .status-warn  { color: #ff9800; }
    .status-err   { color: #f44336; }
    .btn {
      margin-left: auto;
      flex-shrink: 0;
      background: #0078d4;
      color: #fff;
      border: none;
      padding: 3px 10px;
      font-size: 11px;
      border-radius: 3px;
      cursor: pointer;
    }
    .btn:hover { background: #106ebe; }
    .hint {
      margin-top: 10px;
      padding-top: 10px;
      border-top: 1px solid #2a2a2a;
      font-size: 11px;
      color: #666;
    }
  </style>
</head>
<body>
  <div class="title">DevTools++ <span class="v" id="version"></span></div>

  <div class="row" id="row-proxy">
    <span class="row-icon" id="proxy-icon">⚪</span>
    <span class="row-text" id="proxy-text">Checking proxy…</span>
    <button class="btn" id="setup-btn" style="display:none">Open Setup</button>
  </div>

  <div class="row" id="row-scope">
    <span class="row-icon">🌐</span>
    <span class="row-text">
      <span class="label">Scope:</span>
      <span class="value" id="scope-text">All traffic</span>
    </span>
  </div>

  <div class="row" id="row-monitor">
    <span class="row-icon" id="monitor-icon">⏹</span>
    <span class="row-text" id="monitor-text">Monitoring stopped</span>
  </div>

  <div class="row" id="row-autostart" title="Start Monitor and JS Trace automatically when DevTools++ panel opens">
    <span class="row-icon">⚡</span>
    <span class="row-text">Auto-start on panel open</span>
    <input type="checkbox" id="autostart-toggle" style="margin-left:auto;cursor:pointer">
  </div>

  <div class="hint">F12 / Cmd+Opt+I → DevTools++ tab</div>

  <script src="popup.js"></script>
</body>
</html>
